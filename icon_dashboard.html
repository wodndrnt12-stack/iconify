<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconify 아이콘 검색 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  #header h1 {
    font-size: 18px;
    color: #e94560;
    white-space: nowrap;
  }

  #search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  #search-box {
    width: 100%;
    padding: 8px 14px;
    background: #0f3460;
    border: 1px solid #e94560;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
  }

  #search-box:focus {
    border-color: #f5a623;
    box-shadow: 0 0 0 2px rgba(245,166,35,0.2);
  }

  #suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    z-index: 300;
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .sug-item {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #0f3460;
  }

  .sug-item:last-child { border-bottom: none; }

  .sug-item:hover, .sug-item.sug-active {
    background: #0f3460;
  }

  .sug-ko { color: #e0e0e0; }

  .sug-en {
    color: #555;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  #collection-filter {
    padding: 8px 12px;
    background: #0f3460;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    max-width: 220px;
  }

  #collection-filter:focus {
    border-color: #e94560;
  }

  #result-count {
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
  }

  #loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 60px);
    gap: 20px;
  }

  #loading-screen h2 {
    color: #e94560;
    font-size: 20px;
  }

  #progress-bar-wrap {
    width: 360px;
    max-width: 90vw;
    background: #0f3460;
    border-radius: 10px;
    overflow: hidden;
    height: 16px;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #e94560, #f5a623);
    transition: width 0.15s ease;
    border-radius: 10px;
  }

  #loading-status {
    color: #aaa;
    font-size: 14px;
  }

  #main {
    padding: 16px 20px;
    display: none;
  }

  #icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 14px;
  }

  .icon-card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 12px 8px 8px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 100px;
    position: relative;
  }

  .star-btn {
    position: absolute;
    top: 5px;
    left: 6px;
    background: none;
    border: none;
    font-size: 14px;
    color: #444;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    z-index: 1;
    transition: color 0.15s, transform 0.15s;
  }

  .star-btn:hover { color: #f5a623; transform: scale(1.2); }
  .star-btn.active { color: #f5a623; }

  #fav-btn {
    padding: 8px 14px;
    background: #0f3460;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  #fav-btn.active {
    border-color: #f5a623;
    color: #f5a623;
  }

  .icon-card:hover {
    transform: translateY(-2px);
    border-color: #e94560;
    background: #1f2f55;
  }

  .icon-card:active {
    transform: scale(0.96);
  }

  .icon-card img {
    width: 40px;
    height: 40px;
    filter: invert(1);
    object-fit: contain;
  }

  .icon-card .icon-name {
    font-size: 10px;
    color: #aaa;
    word-break: break-all;
    line-height: 1.3;
  }

  .icon-card .copy-hint {
    font-size: 9px;
    color: #555;
    margin-top: -4px;
  }

  #no-results {
    text-align: center;
    padding: 60px 20px;
    color: #666;
    display: none;
  }

  #no-results h3 { font-size: 18px; margin-bottom: 8px; }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #e94560;
    color: white;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  #limit-notice {
    text-align: center;
    padding: 16px;
    color: #666;
    font-size: 13px;
    display: none;
  }

  #preview-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
  }
  #preview-backdrop.open { display: block; }

  #preview-panel {
    position: fixed;
    top: 0;
    right: -340px;
    width: 300px;
    height: 100vh;
    background: #16213e;
    border-left: 2px solid #0f3460;
    z-index: 201;
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 14px;
  }
  #preview-panel.open { right: 0; }

  #preview-close {
    align-self: flex-end;
    background: none;
    border: none;
    color: #aaa;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  #preview-close:hover { color: #e94560; }

  #preview-img {
    width: 160px;
    height: 160px;
    filter: invert(1);
    object-fit: contain;
    margin-top: 20px;
  }

  #preview-id {
    font-size: 13px;
    color: #e0e0e0;
    text-align: center;
    word-break: break-all;
    line-height: 1.5;
  }

  #preview-col {
    font-size: 12px;
    color: #aaa;
    background: #0f3460;
    padding: 3px 10px;
    border-radius: 10px;
  }

  #preview-copy-btn {
    margin-top: 8px;
    padding: 9px 28px;
    background: #e94560;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #preview-copy-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div id="loading-screen">
  <h2>⚡ Iconify DB 로딩 중...</h2>
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <div id="loading-status">준비 중...</div>
</div>

<div id="header" style="display:none">
  <h1>🎨 Iconify</h1>
  <div id="search-wrap">
    <input type="text" id="search-box" placeholder="아이콘 검색... (예: home, arrow, 태양, 집)" autocomplete="off">
    <div id="suggestions"></div>
  </div>
  <select id="collection-filter"><option value="">ALL collections</option></select>
  <button id="fav-btn">★ 즐겨찾기</button>
  <span id="result-count"></span>
</div>

<div id="main">
  <div id="icon-grid"></div>
  <div id="no-results"><h3>검색 결과 없음</h3><p>다른 검색어를 입력하거나 컬렉션 필터를 변경하세요.</p></div>
  <div id="limit-notice">상위 200개만 표시됩니다. 검색어를 좁혀 보세요.</div>
</div>

<div id="toast"></div>

<div id="preview-backdrop"></div>
<div id="preview-panel">
  <button id="preview-close">✕</button>
  <img id="preview-img" src="" alt="">
  <div id="preview-id"></div>
  <div id="preview-col"></div>
  <button id="preview-copy-btn">복사하기</button>
</div>

<script>
(async function() {
  const loadingScreen = document.getElementById('loading-screen');
  const header = document.getElementById('header');
  const main = document.getElementById('main');
  const progressBar = document.getElementById('progress-bar');
  const loadingStatus = document.getElementById('loading-status');
  const searchBox = document.getElementById('search-box');
  const sugBox = document.getElementById('suggestions');
  const collectionFilter = document.getElementById('collection-filter');
  const resultCount = document.getElementById('result-count');
  const iconGrid = document.getElementById('icon-grid');
  const noResults = document.getElementById('no-results');
  const limitNotice = document.getElementById('limit-notice');
  const toast = document.getElementById('toast');
  const previewBackdrop = document.getElementById('preview-backdrop');
  const previewPanel = document.getElementById('preview-panel');
  const previewImg = document.getElementById('preview-img');
  const previewId = document.getElementById('preview-id');
  const previewCol = document.getElementById('preview-col');
  const previewCopyBtn = document.getElementById('preview-copy-btn');

  let db = [];
  let koDict = {};
  let debounceTimer = null;
  let favorites = new Set(JSON.parse(localStorage.getItem('iconify_favorites') || '[]'));
  let favMode = false;
  let sugIndex = -1;

  // ━━━ 자동완성 ━━━
  function showSuggestions(q) {
    sugBox.innerHTML = '';
    sugIndex = -1;
    if (!q || q.length < 1 || Object.keys(koDict).length === 0) {
      sugBox.style.display = 'none';
      return;
    }

    const ql = q.toLowerCase();
    const isKo = /[가-힣]/.test(q);

    let matches;
    if (isKo) {
      // 한국어: ko_dict 키에서 시작 일치 우선, 포함 일치 후순위
      const starts = [];
      const includes = [];
      for (const key of Object.keys(koDict)) {
        if (key === q) continue; // 완전 일치는 제외 (이미 검색됨)
        if (key.startsWith(q)) starts.push(key);
        else if (key.includes(q)) includes.push(key);
      }
      matches = [...starts, ...includes].slice(0, 10);
    } else {
      // 영어: icon name 단어 기반으로 starts-with 먼저
      const starts = [];
      const includes = [];
      for (const key of Object.keys(koDict)) {
        const kl = key.toLowerCase();
        if (kl === ql) continue;
        if (kl.startsWith(ql)) starts.push(key);
        else if (kl.includes(ql)) includes.push(key);
      }
      matches = [...starts, ...includes].slice(0, 10);
    }

    if (matches.length === 0) {
      sugBox.style.display = 'none';
      return;
    }

    for (const key of matches) {
      const item = document.createElement('div');
      item.className = 'sug-item';
      const enPreview = (koDict[key] || []).slice(0, 3).join(', ');
      item.innerHTML = `<span class="sug-ko">${key}</span><span class="sug-en">${enPreview}</span>`;
      item.addEventListener('mousedown', e => {
        e.preventDefault(); // blur 방지
        searchBox.value = key;
        sugBox.style.display = 'none';
        sugIndex = -1;
        renderSearch();
      });
      sugBox.appendChild(item);
    }
    sugBox.style.display = 'block';
  }

  function moveSug(dir) {
    const items = sugBox.querySelectorAll('.sug-item');
    if (!items.length) return;
    items[sugIndex]?.classList.remove('sug-active');
    sugIndex = (sugIndex + dir + items.length + 1) % (items.length + 1) - 1;
    if (sugIndex >= 0) items[sugIndex]?.classList.add('sug-active');
  }

  searchBox.addEventListener('input', () => {
    showSuggestions(searchBox.value.trim());
  });

  searchBox.addEventListener('keydown', e => {
    if (sugBox.style.display === 'none') return;
    if (e.key === 'ArrowDown') { e.preventDefault(); moveSug(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveSug(-1); }
    else if (e.key === 'Enter') {
      const items = sugBox.querySelectorAll('.sug-item');
      if (sugIndex >= 0 && items[sugIndex]) {
        e.preventDefault();
        searchBox.value = items[sugIndex].querySelector('.sug-ko').textContent;
        sugBox.style.display = 'none';
        sugIndex = -1;
        renderSearch();
      }
    } else if (e.key === 'Escape') {
      sugBox.style.display = 'none';
      sugIndex = -1;
    }
  });

  searchBox.addEventListener('blur', () => {
    // 약간 딜레이 줘야 mousedown click 이벤트가 먼저 처리됨
    setTimeout(() => { sugBox.style.display = 'none'; sugIndex = -1; }, 150);
  });

  searchBox.addEventListener('focus', () => {
    if (searchBox.value.trim()) showSuggestions(searchBox.value.trim());
  });

  function saveFavorites() {
    localStorage.setItem('iconify_favorites', JSON.stringify([...favorites]));
  }

  window.toggleFavorite = function(iconId) {
    if (favorites.has(iconId)) {
      favorites.delete(iconId);
    } else {
      favorites.add(iconId);
    }
    saveFavorites();
    document.querySelectorAll(`.star-btn[data-id="${CSS.escape(iconId)}"]`).forEach(btn => {
      btn.classList.toggle('active', favorites.has(iconId));
    });
    if (favMode) renderSearch();
  };

  // ━━━ 1. DB 로드 ━━━
  async function loadDB() {
    // file:// 프로토콜 감지
    if (location.protocol === 'file:') {
      loadingStatus.innerHTML = `
        ⚠️ <strong>file://에서는 fetch가 차단됩니다.</strong><br><br>
        아래 방법 중 하나로 실행하세요:<br><br>
        <strong>방법 1</strong> — <code>start-dashboard.bat</code> 더블클릭<br>
        그 후 브라우저에서: <a href="http://localhost:8000/icon_dashboard.html" style="color:#f5a623">http://localhost:8000/icon_dashboard.html</a><br><br>
        <strong>방법 2</strong> — 터미널에서:<br>
        <code>python -m http.server 8000</code>
      `;
      loadingStatus.style.lineHeight = '1.9';
      loadingStatus.style.textAlign = 'left';
      progressBar.style.display = 'none';
      return;
    }

    try {
      const resp = await fetch('iconify_db.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const contentLength = resp.headers.get('Content-Length');
      const total = contentLength ? parseInt(contentLength) : 0;
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (total > 0) {
          const pct = Math.round((received / total) * 100);
          progressBar.style.width = pct + '%';
          loadingStatus.textContent = `${(received / 1024 / 1024).toFixed(1)} MB / ${(total / 1024 / 1024).toFixed(1)} MB (${pct}%)`;
        } else {
          progressBar.style.width = '60%';
          loadingStatus.textContent = `${(received / 1024 / 1024).toFixed(1)} MB 수신됨...`;
        }
      }

      loadingStatus.textContent = 'JSON 파싱 중...';
      progressBar.style.width = '80%';

      // Decode
      const totalBytes = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        totalBytes.set(chunk, offset);
        offset += chunk.length;
      }
      const text = new TextDecoder().decode(totalBytes);

      progressBar.style.width = '95%';
      await new Promise(r => setTimeout(r, 10)); // let UI update
      db = JSON.parse(text);

      progressBar.style.width = '100%';
      loadingStatus.textContent = `완료! ${db.length.toLocaleString()}개 아이콘 로드됨`;
      await new Promise(r => setTimeout(r, 400));

      // ko_dict.json 로드
      try {
        const dictResp = await fetch('ko_dict.json');
        if (dictResp.ok) koDict = await dictResp.json();
      } catch(e) { /* fallback: 영문 검색만 동작 */ }

      initUI();
    } catch (err) {
      loadingStatus.innerHTML = `오류: ${err.message}<br><br>
        <strong>iconify_db.json</strong>이 같은 폴더에 있는지 확인하세요.<br>
        file:// 프로토콜이면 <code>start-dashboard.bat</code>을 실행해주세요.`;
      loadingStatus.style.lineHeight = '1.9';
      loadingStatus.style.color = '#e94560';
      console.error(err);
    }
  }

  // ━━━ 2. UI 초기화 ━━━
  function initUI() {
    const iconById = new Map(db.map(i => [i.icon_id, i]));

    function openPreview(iconId) {
      const icon = iconById.get(iconId);
      if (!icon) return;
      previewImg.src = icon.svg_url;
      previewId.textContent = icon.icon_id;
      previewCol.textContent = icon.collection;
      previewCopyBtn.onclick = () => copyIcon(iconId);
      previewPanel.classList.add('open');
      previewBackdrop.classList.add('open');
    }

    function closePreview() {
      previewPanel.classList.remove('open');
      previewBackdrop.classList.remove('open');
    }

    document.getElementById('preview-close').addEventListener('click', closePreview);
    previewBackdrop.addEventListener('click', closePreview);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

    window.openPreview = openPreview;

    // 컬렉션 목록 추출
    const collections = [...new Set(db.map(i => i.collection))].sort();
    collections.forEach(col => {
      const opt = document.createElement('option');
      opt.value = col;
      opt.textContent = col;
      collectionFilter.appendChild(opt);
    });

    loadingScreen.style.display = 'none';
    header.style.display = 'flex';
    main.style.display = 'block';

    searchBox.focus();
    renderSearch();
  }

  // ━━━ 3. 검색 ━━━
  function isKorean(str) {
    return /[가-힣]/.test(str);
  }

  function scoreIcon(icon, keywords) {
    let score = 0;
    for (let i = 0; i < keywords.length; i++) {
      const kw = keywords[i].toLowerCase();
      const w = 1 / (i + 1);
      const n = icon.name.toLowerCase();
      const id = icon.icon_id.toLowerCase();
      const c = icon.collection.toLowerCase();

      if (n === kw || id === kw)         score += 5 * w;
      else if (n.startsWith(kw))         score += 3 * w;
      else if (n.includes(kw))           score += 1 * w;
      else if (c.includes(kw))           score += 0.3 * w;
      else return null; // AND 조건: 하나라도 실패 → 제외
    }
    return score;
  }

  function toEnglishKeywords(query) {
    if (koDict[query]) return koDict[query];
    // 단일 영문자는 무의미, 단일 한국어는 허용
    if (query.length < 2 && !/[가-힣]/.test(query)) return [];

    // 부분 포함 매칭 여러 개 합산
    const results = [];
    for (const [ko, en] of Object.entries(koDict)) {
      if (query.includes(ko) || ko.includes(query)) {
        results.push(...en);
      }
    }
    return [...new Set(results)];
  }

  function getResults(query, collection) {
    const q = query.trim();
    if (!q) return db.filter(icon => !collection || icon.collection === collection);

    const pool = collection ? db.filter(i => i.collection === collection) : db;
    const ko = isKorean(q);

    if (ko) {
      const tokens = q.toLowerCase().split(/\s+/).filter(Boolean);

      if (tokens.length > 1) {
        // 다중 한국어 토큰: 토큰 내 OR, 토큰 간 AND
        const tokenKws = tokens.map(t => toEnglishKeywords(t)).filter(s => s.length > 0);
        if (tokenKws.length === 0) return [];

        return pool.filter(icon => {
          const n = icon.name.toLowerCase();
          const id = icon.icon_id.toLowerCase();
          const c = icon.collection.toLowerCase();
          return tokenKws.every(kws =>
            kws.some(kw => {
              const k = kw.toLowerCase();
              return n === k || n.startsWith(k) || n.includes(k) || id.includes(k) || c.includes(k);
            })
          );
        });
      }

      const keywords = toEnglishKeywords(tokens[0]);
      if (keywords.length === 0) return [];
      return pool
        .map(icon => ({ icon, score: scoreIcon(icon, keywords) }))
        .filter(({ score }) => score !== null && score > 0)
        .sort((a, b) => b.score - a.score)
        .map(({ icon }) => icon);
    }

    const keywords = q.toLowerCase().split(/\s+/).filter(Boolean);
    return pool
      .map(icon => ({ icon, score: scoreIcon(icon, keywords) }))
      .filter(({ score }) => score !== null && score > 0)
      .sort((a, b) => b.score - a.score)
      .map(({ icon }) => icon);
  }

  function renderSearch() {
    const q = searchBox.value;
    const col = collectionFilter.value;

    let all;
    if (favMode) {
      if (q) {
        all = getResults(q, col).filter(icon => favorites.has(icon.icon_id));
      } else {
        all = db.filter(icon => favorites.has(icon.icon_id) && (!col || icon.collection === col));
      }
    } else {
      all = getResults(q, col);
    }

    const icons = all.slice(0, 200);

    resultCount.textContent = favMode
      ? `즐겨찾기: ${all.length}개`
      : `결과: ${all.length.toLocaleString()}개`;

    if (icons.length === 0) {
      iconGrid.innerHTML = '';
      noResults.style.display = 'block';
      limitNotice.style.display = 'none';
    } else {
      noResults.style.display = 'none';
      limitNotice.style.display = all.length > 200 ? 'block' : 'none';
      iconGrid.innerHTML = icons.map(icon => {
        const safeId = icon.icon_id.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const isFav = favorites.has(icon.icon_id);
        return `<div class="icon-card" onclick="openPreview('${safeId}')">
          <button class="star-btn${isFav ? ' active' : ''}" data-id="${safeId}"
            onclick="event.stopPropagation(); toggleFavorite('${safeId}')">★</button>
          <img src="${icon.svg_url}" loading="lazy" alt="${icon.name}" onerror="this.style.opacity='0.2'">
          <span class="icon-name">${icon.icon_id}</span>
          <span class="copy-hint">클릭하여 미리보기</span>
        </div>`;
      }).join('');
    }
  }

  searchBox.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderSearch, 300);
  });

  collectionFilter.addEventListener('change', renderSearch);

  document.getElementById('fav-btn').addEventListener('click', () => {
    favMode = !favMode;
    document.getElementById('fav-btn').classList.toggle('active', favMode);
    renderSearch();
  });

  // ━━━ 4. 복사 & 토스트 ━━━
  let toastTimer = null;
  window.copyIcon = function(iconId) {
    navigator.clipboard.writeText(iconId).then(() => {
      showToast(`✅ ${iconId} 복사됨!`);
    }).catch(() => {
      // fallback
      const el = document.createElement('textarea');
      el.value = iconId;
      el.style.position = 'fixed';
      el.style.opacity = '0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast(`✅ ${iconId} 복사됨!`);
    });
  };

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ━━━ 시작 ━━━
  await loadDB();
})();
</script>
</body>
</html>
